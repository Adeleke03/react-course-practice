<!doctype html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container).render(<App />);

      function ClickButton() {
  
      
       const  [countValue, setCountValue] = React.useState(0)
       function countClicks(event) {
         setCountValue(prev => prev + 1);
        }
        function resetCount() {
          setCountValue(0)
        }
        return (
        <>
          <button onClick={countClicks}>Clicked {countValue} {countValue === 1 ? 'time' : 'times'}</button>
          <button onClick={countClicks}>Clicked {countValue} {countValue === 1 ? 'time' : 'times'}</button>
          <button onClick={resetCount}>Reset</button>

          </>        
        );
      };

      function NameInput() {
        const [inputText, setInputText] = React.useState('')
        const [exampleName, setExampleName] = React.useState([
          'Alice'
        ])
        function saveInputText(event) {
                   setInputText(event.target.value);
           
                  }
                  function resetText() {
                     setInputText('');
                  }
                  function saveExampleName() {
                   setInputText('Alice')
                  }
        return (
          <>
          <input type="text"
          onChange={saveInputText}
          value={inputText}
          placeholder='Type a name here'/>
          <button  onClick={resetText}>Reset</button>
          <button onClick={saveExampleName}  >Example</button>
          <p>Hello {inputText} </p>
          </>
        )
      }
      
      function App() {
        return (
          <>
          <ClickButton/>
          <div>
            <NameInput/>
            </div>
          </>
        );
      }
    </script>
  </body>
</html>
