<!doctype html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script src="react-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container).render(<App />);

      function LoginForm() {
        return (
          <>
           <div>
              <input type="email" name="email" placeholder="Email" id="email"/>
              </div>
            <div>
              <input type="password" name="email" placeholder="Password" id="email"/>
              </div>
            <div>
              <button>Login</button>
              <button>Sign up</button>
            </div>
            </>
        );
      };

      function ProductDetails({name,price,discountPrice,imageSrc}) {
        const result = discountPrice ? <del>Price : ${price}</del> : <p>Price: ${price}</p>;
         return (
        <div>
          <img src={imageSrc} width="50" alt=""/>
          <p>{name}</p>
          {result }
           {discountPrice && <p>Discount price: ${discountPrice}</p>}
          <button>Add to Cart</button>
          </div>
          
       );
      };

      function App() {
        return (
          <>
            <p>Hello, welcome to my website</p>
            <LoginForm/>
        <ProductDetails name="Cotton Socks" price="10.90" discountPrice="5.45" imageSrc="cotton-socks.png"/>
        <ProductDetails name="Tennis balls" price="6.00"  imageSrc="tennis-balls.png" />
        <ProductDetails name="Plain T-Shirt" price="7.99" imageSrc="plain-t-shirt.png"/>

           
          </>
        );
      }
    </script>
  </body>
</html>
